<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DTO-Bioflow dataset visualisation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map, #map-wp2 { width: 100%; height: 600px; margin: 20px 0; border: 1px solid #ccc; }
        .geojson-help { margin-top:8px; font-size:0.95rem; color:#333 }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-container">
        <a href="https://dto-bioflow.eu/" class="navbar-logo">
            <img src="https://dto-bioflow.eu/themes/custom/skeleton/logo.svg" alt="DTO-Bioflow logo">
        </a>
        <ul class="navbar-menu">
            <li><a href="index.html">Welcome</a></li>
            <li><a href="maps.html">Spatial Coverage</a></li>
            <li><a href="taxonomic_diversity.html">Taxonomic Diversity</a></li>
            <li><a href="temporal.html">Temporal Overview</a></li>
            <li><a href="bioflow_datasets.html">DTO-Bioflow Datasets</a></li>
        </ul>
    </div>
</nav>
<main class="page-content">
    <h2>Maps</h2>

    <div style="margin-bottom: 15px;">
        <label for="map-selector" style="font-weight: bold; margin-right: 10px;">Select Data Layer:</label>
        <select id="map-selector" style="padding: 8px; font-size: 1rem;">
            <option value="wp2">Cluster 1: Observation data (WP2 call-1)</option>
            <option value="wp3">Cluster 2: Sensor observation data (WP3)</option>
            <option value="combined">Cluster 1 + 2</option>
            <option value="etn">Cluster 3: ETN data (European Tracking Network)</option>
        </select>
    </div>

    <div id="map"></div>
    <div id="geojson-help" class="geojson-help"></div>

    <script>
        // Initialize single map
        const map = L.map('map').setView([52.5, 10.0], 4);

        // Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors', maxZoom: 19
        }).addTo(map);

        let currentLayer = null;

        // White to Blue colormap with quantile normalization
        function getWhiteToBlueColor(normalized) {
            const r = Math.round(255 * (1 - normalized));
            const g = Math.round(255 * (1 - normalized));
            const b = 255;
            return `rgb(${r},${g},${b})`;
        }

        // Quantile normalization: maps values to their quantile positions (0-1)
        function quantileNormalize(value, sortedValues) {
            let left = 0, right = sortedValues.length - 1;
            while (left < right) {
                const mid = Math.floor((left + right) / 2);
                if (sortedValues[mid] < value) {
                    left = mid + 1;
                } else {
                    right = mid;
                }
            }
            return left / (sortedValues.length - 1);
        }

        // Configuration for each map layer
        const mapLayers = {
            wp2: {
                file: 'resources/maps/wp2_observations_hexagons.geojson',
                type: 'polygon'
            },
            wp3: {
                file: 'resources/maps/wp3_sensor_observations_hexagons.geojson',
                type: 'polygon'
            },
            combined: {
                file: 'resources/maps/all_observations_hexagons.geojson',
                type: 'polygon'
            },
            etn: {
                file: 'resources/maps/etn_combined_map.geojson',
                type: 'point'
            }
        };

        // Load and display GeoJSON
        function loadMapLayer(layerId) {
            const config = mapLayers[layerId];

            // Clear existing layer
            if (currentLayer) {
                map.removeLayer(currentLayer);
            }
            document.getElementById('geojson-help').innerHTML = '';

            // Fetch and render
            fetch(config.file)
                .then(r => {
                    if(!r.ok) throw new Error('HTTP '+r.status);
                    return r.json();
                })
                .then(data => {
                    const counts = data.features
                        .map(feature => feature.properties.count || 0)
                        .sort((a, b) => a - b);

                    if (config.type === 'polygon') {
                        currentLayer = L.geoJSON(data, {
                            style: (feature) => {
                                const count = feature.properties.count || 0;
                                const normalizedQuantile = quantileNormalize(count, counts);
                                const color = getWhiteToBlueColor(normalizedQuantile);
                                return {
                                    fillColor: color,
                                    color: '#333',
                                    weight: 0.5,
                                    opacity: 0.7,
                                    fillOpacity: 0.6
                                };
                            },
                            onEachFeature: (feature, layer) => {
                                const count = feature.properties.count || 0;
                                layer.bindPopup(`<strong>Count:</strong> ${count}`);
                            }
                        });
                    } else if (config.type === 'point') {
                        currentLayer = L.geoJSON(data, {
                            pointToLayer: (feature, latlng) => {
                                const count = feature.properties.count || 0;
                                const normalizedQuantile = quantileNormalize(count, counts);
                                const color = getWhiteToBlueColor(normalizedQuantile);
                                const marker = L.circleMarker(latlng, {
                                    radius: 6,
                                    fillColor: color,
                                    color: '#000',
                                    weight: 1,
                                    opacity: 0.8,
                                    fillOpacity: 0.7
                                });
                                marker.bindPopup(`<strong>Station:</strong> ${feature.properties.station_name}<br><strong>Count:</strong> ${count}`);
                                return marker;
                            }
                        });
                    }

                    currentLayer.addTo(map);

                    // Fit bounds
                    try {
                        const bounds = currentLayer.getBounds();
                        if(bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.1));
                    } catch(e) { console.warn('Could not fit bounds:', e); }
                })
                .catch(error => {
                    console.error('Error loading GeoJSON:', error);
                    document.getElementById('geojson-help').innerHTML = `<div style="margin:6px 0; padding:6px; background:#f8d7da; border:1px solid #f5c6cb; color:#721c24">Error loading map data. Please ensure the file is served over HTTP.</div>`;
                });
        }

        // Handle dropdown selection
        document.getElementById('map-selector').addEventListener('change', (e) => {
            loadMapLayer(e.target.value);
        });

        // Load initial layer (WP2)
        loadMapLayer('wp2');
    </script>
</main>
